<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babytaby Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f8f8f8;
}

header{
  background:#ff6b81;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.cart-icon{
  cursor:pointer;
}

.banner{
  background:#ffe9ec;
  padding:20px;
  text-align:center;
}

.banner h2{
  margin:0;
  color:#ff6b81;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:8px;
}

.price{
  color:#ff6b81;
  font-weight:bold;
}

.old-price{
  text-decoration:line-through;
  color:gray;
  font-size:14px;
}

.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:gold;
  padding:4px 8px;
  font-size:12px;
  font-weight:bold;
  border-radius:5px;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  overflow:auto;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  margin:40px auto;
  padding:15px;
  border-radius:10px;
}

.slider img{
  width:100%;
  border-radius:10px;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

button{
  background:#ff6b81;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.close{
  float:right;
  cursor:pointer;
  font-weight:bold;
}

.cart-item{
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.total{
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div>Babytaby</div>
  <div class="cart-icon" onclick="openCart()">Cart (<span id="cartCount">0</span>)</div>
</header>

<div class="banner">
  <h2>Cute essentials for your cute baby</h2>
  <p>Sale is live. Free shipping always</p>
  <p>Cash on Delivery Available</p>
</div>

<div class="products" id="productList"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">X</span>
    <div class="slider" id="slider"></div>
    <h3 id="modalName"></h3>
    <p id="modalDesc"></p>
    <p>
      <span class="old-price" id="modalOldPrice"></span>
      <span class="price" id="modalPrice"></span>
    </p>
    <div class="qty">
      <button onclick="changeQty(-1)">-</button>
      <span id="quantity">1</span>
      <button onclick="changeQty(1)">+</button>
