<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabyTaby</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f9f9f9;
}

/* Banner */
.banner{
position:relative;
width:100%;
}

.banner img{
width:100%;
display:block;
}

.banner-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.4);
padding:10px 20px;
border-radius:10px;
}

/* Product Grid */
.products{
display:grid;
grid-template-columns:1fr;
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.product img{
width:100%;
border-radius:10px;
}

.price-row{
display:flex;
gap:10px;
align-items:center;
margin-top:5px;
}

.mrp{
text-decoration:line-through;
color:gray;
}

.discount{
color:green;
font-weight:bold;
}

/* Buttons */
.btn{
display:block;
text-align:center;
padding:14px;
margin-top:10px;
border-radius:30px;
font-weight:600;
text-decoration:none;
border:none;
cursor:pointer;
font-size:15px;
}

.buy{
background:#ff4d4d;
color:white;
}

.cart-btn{
background:#007bff;
color:white;
}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:999;
overflow:auto;
display:none;
padding:15px;
}

.popup img{
width:100%;
border-radius:10px;
object-fit:contain;
max-height:300px;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:24px;
cursor:pointer;
}

/* Cart Drawer */
.cart{
position:fixed;
right:-100%;
top:0;
width:100%;
height:100%;
background:white;
z-index:1000;
transition:0.3s;
padding:15px;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
<img src="images/banner.jpg">
<div class="banner-text">Premium Baby Care Products</div>
</div>

<!-- Products -->
<div class="products" id="productList"></div>

<!-- Popup -->
<div class="popup" id="popup"></div>

<!-- Cart -->
<div class="cart" id="cart">
<h2>My Cart</h2>
<div id="cartItems"></div>

<button onclick="checkoutCart()" class="btn buy">Order via WhatsApp</button>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSf9jmBxghPrXxAybQ-XNb3EmbPoUr9GQhdtJc3XlodeQjM48Q/viewform?usp=dialog"
target="_blank"
class="btn cart-btn"
style="margin-top:10px;">
Order via Google Form
</a>

<button onclick="closeCart()" class="btn" style="background:gray;color:white;margin-top:15px;">
Close Cart
</button>
</div>

<a href="#" onclick="openCart()" class="whatsapp-float">🛒 Cart</a>

<script>

const whatsappNumber = "918889446299";
const formLink = "https://docs.google.com/forms/d/e/1FAIpQLSf9jmBxghPrXxAybQ-XNb3EmbPoUr9GQhdtJc3XlodeQjM48Q/viewform?usp=dialog";

const products = [

{
name:"Baby Head Protector",
price:499,
mrp:999,
images:[
"images/product1_1.jpg",
"images/product1_2.jpg",
"images/product1_3.jpg",
"images/product1_4.jpg",
"images/product1_5.jpg"
],
description:"Protect your baby from head injuries during crawling and walking. Soft, breathable and lightweight design ensures safety and comfort."
},

{
name:"Baby Knee Pads",
price:299,
mrp:599,
images:[
"images/product2_1.jpg",
"images/product2_2.jpg",
"images/product2_3.jpg",
"images/product2_4.jpg",
"images/product2_5.jpg"
],
description:"Soft anti-slip knee pads protect baby's knees while crawling. Comfortable stretchable fabric for daily use."
},

{
name:"Electric Baby Nail Trimmer",
price:699,
mrp:1299,
images:[
"images/product3_1.jpg",
"images/product3_2.jpg",
"images/product3_3.jpg",
"images/product3_4.jpg",
"images/product3_5.jpg"
],
description:"Safe and gentle electric nail trimmer designed specially for babies. Smooth trimming without hurting delicate fingers."
}

];

let cart=[];

function loadProducts(){
let html="";
products.forEach((p,i)=>{
let discount = Math.round(((p.mrp - p.price)/p.mrp)*100);
html+=`
<div class="product" onclick="openPopup(${i})">
<img src="${p.images[0]}">
<h3>${p.name}</h3>
<div class="price-row">
<span class="mrp">₹${p.mrp}</span>
<span>₹${p.price}</span>
<span class="discount">${discount}% OFF</span>
</div>
</div>
`;
});
document.getElementById("productList").innerHTML=html;
}

function openPopup(i){
let p=products[i];
let discount = Math.round(((p.mrp - p.price)/p.mrp)*100);

document.getElementById("popup").innerHTML=`
<span class="close" onclick="closePopup()">✖</span>
<img src="${p.images[0]}">
<h2>${p.name}</h2>

<div class="price-row">
<span class="mrp">₹${p.mrp}</span>
<span>₹${p.price}</span>
<span class="discount">${discount}% OFF</span>
</div>

<p>${p.description}</p>

<a href="${formLink}" target="_blank" 
class="btn buy" 
style="padding:10px;font-size:14px;">
Buy Now
</a>

<button onclick='addToCart(products[${i}])' 
class="btn cart-btn" 
style="padding:16px;font-size:16px;">
Add to Cart
</button>
`;
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function addToCart(product){
cart.push(product);
alert("Added to Cart");
}

function openCart(){
document.getElementById("cart").classList.add("active");
renderCart();
}

function closeCart(){
document.getElementById("cart").classList.remove("active");
}

function renderCart(){
let html="";
cart.forEach(item=>{
html+=`
<div class="cart-item">
<b>${item.name}</b><br>
₹${item.price}
</div>
`;
});
document.getElementById("cartItems").innerHTML=html;
}

function checkoutCart(){
if(cart.length===0){
alert("Cart is empty");
return;
}
let message="Order Details:%0A";
cart.forEach(item=>{
message+=item.name+" - ₹"+item.price+"%0A";
});
window.open("https://wa.me/"+whatsappNumber+"?text="+message);
}

loadProducts();
</script>

</body>
</html>
