<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babytaby - Baby Products</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #fff4f8;
}

header {
    background: linear-gradient(90deg,#ff8fab,#ffb3c6);
    padding: 15px;
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
    padding: 15px;
}

.product {
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff4d6d;
    border: none;
    color: white;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #e63956;
}

.cart {
    background: white;
    padding: 15px;
    margin: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>Babytaby 🍼</header>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200" />
<h4>Baby Knee Pads</h4>
<p>₹199</p>
<button onclick="addToCart('Baby Knee Pads',199)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200" />
<h4>Baby Head Protector</h4>
<p>₹399</p>
<button onclick="addToCart('Baby Head Protector',399)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200" />
<h4>Feeding Bottle Set</h4>
<p>₹299</p>
<button onclick="addToCart('Feeding Bottle Set',299)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200" />
<h4>Baby Romper</h4>
<p>₹349</p>
<button onclick="addToCart('Baby Romper',349)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200" />
<h4>Baby Bath Towel</h4>
<p>₹249</p>
<button onclick="addToCart('Baby Bath Towel',249)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h3>🛒 Your Cart</h3>
<ul id="cartItems"></ul>
<h4>Total: ₹<span id="total">0</span></h4>
<button onclick="checkout()">Checkout (COD)</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
    cart.push({name, price});
    displayCart();
}

function displayCart() {
    let list = document.getElementById("cartItems");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price;
        list.innerHTML += "<li>" + item.name + " - ₹" + item.price + "</li>";
    });

    document.getElementById("total").innerText = total;
}

function checkout() {
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    let orderSummary = cart.map(item => item.name + " ₹" + item.price).join(", ");
    let total = cart.reduce((sum,item)=>sum+item.price,0);

    let googleFormURL = "https://docs.google.com/forms/d/e/1FAIpQLSf9jmBxghPrXxAybQ-XNb3EmbPoUr9GQhdtJc3XlodeQjM48Q/viewform";

    window.location.href = googleFormURL + 
    "?entry.166477120=" + encodeURIComponent(orderSummary) +
"&entry.178886703=" + total;
}
</script>

</body>
</html>
