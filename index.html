<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babytaby Store</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#fdfdfd;
  color:#333;
}

header{
  background:#ff758f;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  font-family:'Poppins',sans-serif;
  font-weight:600;
}

.cart-icon{
  cursor:pointer;
}

.banner{
  position:relative;
  height:280px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  overflow:hidden;
}
.banner img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
.banner-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,117,143,0.45);
}
.banner-content{
  position:relative;
  z-index:2;
}
.banner h1{
  font-family:'Poppins',sans-serif;
  font-size:2.2em;
  margin-bottom:10px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-6px);
}
.card img{
  width:100%;
  transition:0.3s;
}
.card:hover img{
  transform:scale(1.08);
}
.card h4{
  margin:10px;
}
.price{
  color:#ff4d4d;
  font-weight:bold;
  margin-left:10px;
}
.old-price{
  text-decoration:line-through;
  margin-left:10px;
  color:#888;
}
.delivery{
  font-size:0.85em;
  margin:10px;
  color:#666;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ffd700;
  padding:5px 8px;
  border-radius:6px;
  font-size:0.75em;
  font-weight:bold;
}
.discount{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff4d4d;
  color:white;
  padding:5px 8px;
  border-radius:6px;
  font-size:0.75em;
}

.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  top:0;
  left:0;
  overflow:auto;
}
.modal-content{
  background:white;
  width:90%;
  max-width:450px;
  margin:40px auto;
  padding:20px;
  border-radius:15px;
  position:relative;
}
.close{
  position:absolute;
  right:15px;
  top:15px;
  cursor:pointer;
  font-weight:bold;
}
.slider img{
  width:100%;
  border-radius:10px;
}
.thumbnails{
  display:flex;
  gap:6px;
  margin-top:8px;
  justify-content:center;
}
.thumbnails img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
}
.thumbnails img.active{
  border:2px solid #ff758f;
}

.qty{
  display:flex;
  gap:15px;
  align-items:center;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.buy{
  background:linear-gradient(90deg,#ff4d4d,#ff8c00);
  color:white;
}
.cart-btn{
  background:linear-gradient(90deg,#ff758f,#ffb6c1);
  color:white;
}
.whatsapp{
  background:linear-gradient(90deg,#25D366,#128C7E);
  color:white;
}
</style>
</head>

<body>

<header>
<div>Babytaby</div>
<div class="cart-icon">Cute essentials for your cute baby</div>
</header>

<div class="banner">
<img src="images/banner.jpg">
<div class="banner-overlay"></div>
<div class="banner-content">
<h1>Sale is Live</h1>
<p>Free Shipping Always</p>
</div>
</div>

<div class="products" id="productList"></div>

<div class="modal" id="productModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<div class="slider" id="slider"></div>
<div class="thumbnails" id="thumbnails"></div>
<h3 id="modalName"></h3>
<p id="modalDesc"></p>
<p><span class="old-price" id="modalOldPrice"></span>
<span class="price" id="modalPrice"></span></p>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="quantity">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button class="buy" onclick="buyNow()">Buy Now</button>
<button class="cart-btn" onclick="addToCart()">Add To Cart</button>
<button class="whatsapp" onclick="orderWhatsApp()">Quick Order on WhatsApp</button>

</div>
</div>

<script>

var googleFormBase="https://docs.google.com/forms/d/e/1FAIpQLSf9jmBxghPrXxAybQ-XNb3EmbPoUr9GQhdtJc3XlodeQjM48Q/formResponse";
var whatsappNumber="918889446299";

var products=[
{
id:1,
name:"3-in-1 Baby Safety Protection Set",
price:399,
oldPrice:599,
bestSeller:true,
description:"Head protector + Back cushion + Knee pads.",
delivery:"Delivery: 4–8 Days",
returnPolicy:"5 Days Return/Replacement",
images:["images/product1_1.jpg","images/product1_2.jpg","images/product1_3.jpg","images/product1_4.jpg","images/product1_5.jpg"]
},
{
id:2,
name:"360° Spill-Proof Baby Feeding Bowl",
price:249,
oldPrice:299,
bestSeller:true,
description:"BPA Free rotating spill-proof bowl.",
delivery:"Delivery: 4–8 Days",
returnPolicy:"5 Days Return/Replacement",
images:["images/product2_1.jpg","images/product2_2.jpg","images/product2_3.jpg","images/product2_4.jpg","images/product2_5.jpg"]
},
{
id:3,
name:"Electric Baby Nail Trimmer",
price:349,
oldPrice:399,
bestSeller:false,
description:"Safe nail file with LED light.",
delivery:"Delivery: 4–8 Days",
returnPolicy:"5 Days Return/Replacement",
images:["images/product3_1.jpg","images/product3_2.jpg","images/product3_3.jpg","images/product3_4.jpg","images/product3_5.jpg"]
}
];

var currentProduct;
var currentQty=1;
var currentImageIndex=0;

function discount(oldPrice,price){
return Math.round(((oldPrice-price)/oldPrice)*100);
}

function loadProducts(){
var container=document.getElementById("productList");
container.innerHTML="";
products.forEach(p=>{
container.innerHTML+=`
<div class="card" onclick="openModal(${p.id})">
${p.bestSeller?'<div class="badge">Best Seller</div>':''}
<div class="discount">-${discount(p.oldPrice,p.price)}%</div>
<img src="${p.images[0]}">
<h4>${p.name}</h4>
<p class="old-price">₹${p.oldPrice}</p>
<p class="price">₹${p.price}</p>
<p class="delivery">${p.delivery}</p>
</div>`;
});
}

function openModal(id){
currentProduct=products.find(p=>p.id===id);
currentQty=1;
currentImageIndex=0;
document.getElementById("productModal").style.display="block";
updateModal();
}

function updateModal(){
document.getElementById("slider").innerHTML=`<img src="${currentProduct.images[currentImageIndex]}">`;
document.getElementById("modalName").innerText=currentProduct.name;
document.getElementById("modalDesc").innerHTML=
currentProduct.description+"<br><br><b>"+currentProduct.delivery+"</b><br><b>"+currentProduct.returnPolicy+"</b>";
document.getElementById("modalOldPrice").innerText="₹"+currentProduct.oldPrice;
document.getElementById("modalPrice").innerText=" ₹"+currentProduct.price;
document.getElementById("quantity").innerText=currentQty;

var thumb=document.getElementById("thumbnails");
thumb.innerHTML="";
currentProduct.images.forEach((img,i)=>{
thumb.innerHTML+=`<img src="${img}" class="${i===currentImageIndex?'active':''}" onclick="changeImage(${i})">`;
});
}

function changeImage(i){
currentImageIndex=i;
updateModal();
}

function changeQty(v){
currentQty+=v;
if(currentQty<1)currentQty=1;
document.getElementById("quantity").innerText=currentQty;
}

function buyNow(){
var total=currentProduct.price*currentQty;
var summary=currentProduct.name+" x "+currentQty;
var url=googleFormBase+"?entry.166477120="+encodeURIComponent(summary)+"&entry.178886703="+encodeURIComponent("₹"+total)+"&entry.509043788="+encodeURIComponent("Cash on Delivery");
window.open(url,"_blank");
}

function orderWhatsApp(){
var total=currentProduct.price*currentQty;
var msg="Hello, I want to order:\n"+currentProduct.name+" x "+currentQty+"\nTotal: ₹"+total;
window.open("https://wa.me/"+whatsappNumber+"?text="+encodeURIComponent(msg));
}

function addToCart(){
alert("Added to cart (demo version)");
closeModal();
}

function closeModal(){
document.getElementById("productModal").style.display="none";
}

loadProducts();

</script>

</body>
</html>
